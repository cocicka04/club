<!-- AI Barista — для всех пользователей -->
<div class="ai-barista glass-card" style="padding: 20px; margin: 20px 0;">
  <h3 style="color: #6ECBF5; font-family: 'Orbitron', sans-serif;">🤖 ИИ-Бариста</h3>
  <p style="font-size: 0.8rem; opacity: 0.6;">Спроси, что выпить или съесть перед игрой</p>
  
  <input type="text" id="barista-input" placeholder="Например: что выпить перед турниром по CS2?" 
         style="width: 100%; padding: 10px; margin: 10px 0; background: rgba(10,8,26,0.8); border: 1px solid rgba(88,106,226,0.3); color: white; border-radius: 6px;">
  
  <button onclick="askBarista()" class="btn">Спросить</button>
  
  <div id="barista-reply" style="margin-top: 15px; padding: 10px; background: rgba(110,203,245,0.05); border-radius: 8px; display: none;"></div>
</div>
<!-- AI Admin Assistant — только для superuser -->
{% if request.user.is_superuser %}
<div class="ai-admin glass-card" style="padding: 20px; margin: 20px 0; border: 1px solid rgba(194,82,225,0.5);">
  <h3 style="color: #C252E1; font-family: 'Orbitron', sans-serif;">👑 ИИ-Секретарь</h3>
  
  <select id="admin-task-type" style="margin: 10px 0; padding: 8px; background: rgba(10,8,26,0.8); border: 1px solid rgba(194,82,225,0.3); color: white; border-radius: 6px; width: 100%;">
    <option value="">Выбери тип задачи...</option>
    <option value="Напиши новость о новой акции: ">📝 Новость</option>
    <option value="Придумай пост для Telegram: ">📢 Пост в Telegram</option>
    <option value="Ответь на негативный отзыв: ">💬 Ответ на отзыв</option>
    <option value="Придумай идею для турнира: ">🏆 Идея турнира</option>
    <option value="Сгенерируй акцию: ">🎁 Акция</option>
    <option value="">Свой запрос</option>
  </select>
  
  <textarea id="admin-input" rows="4" placeholder="Опиши задачу..." 
            style="width: 100%; padding: 10px; margin: 10px 0; background: rgba(10,8,26,0.8); border: 1px solid rgba(194,82,225,0.3); color: white; border-radius: 6px;"></textarea>
  
  <div style="display: flex; gap: 10px;">
    <button onclick="askAdmin()" class="btn">Сгенерировать</button>
    <button onclick="document.getElementById('admin-input').value=''" class="btn-outline">Очистить</button>
  </div>
  
  <div id="admin-reply" style="margin-top: 15px; padding: 15px; background: rgba(194,82,225,0.05); border-radius: 8px; border-left: 3px solid #C252E1; display: none; position: relative;">
    <button onclick="copyToClipboard()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; color: #6ECBF5; cursor: pointer;">📋</button>
    <div id="admin-reply-text"></div>
  </div>
</div>

<script>
document.getElementById('admin-task-type').addEventListener('change', function() {
  const input = document.getElementById('admin-input');
  if (this.value) {
    input.value = this.value;
    input.focus();
  }
});

async function askAdmin() {
  const input = document.getElementById('admin-input');
  const replyDiv = document.getElementById('admin-reply');
  const replyText = document.getElementById('admin-reply-text');
  const query = input.value.trim();
  
  if (!query) return;
  
  replyDiv.style.display = 'block';
  replyText.innerHTML = '<span style="opacity: 0.5;">⏳ Генерирую...</span>';
  
  try {
    const response = await fetch('/api/ai-admin/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
      body: JSON.stringify({ query: query })
    });
    
    const data = await response.json();
    replyText.innerHTML = data.reply.replace(/\n/g, '<br>');
  } catch (e) {
    replyText.innerHTML = 'Ошибка связи с ИИ.';
  }
}

function copyToClipboard() {
  const text = document.getElementById('admin-reply-text').innerText;
  navigator.clipboard.writeText(text);
  alert('Скопировано!');
}
</script>
{% endif %}

<script>
async function askBarista() {
  const input = document.getElementById('barista-input');
  const replyDiv = document.getElementById('barista-reply');
  const query = input.value.trim();
  
  if (!query) return;
  
  replyDiv.style.display = 'block';
  replyDiv.innerHTML = '<span style="opacity: 0.5;">⏳ Думаю...</span>';
  
  try {
    const response = await fetch('/api/ai-barista/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
      body: JSON.stringify({ query: query })
    });
    
    const data = await response.json();
    replyDiv.innerHTML = '<strong>🤖 Бар-бот:</strong><br>' + data.reply;
  } catch (e) {
    replyDiv.innerHTML = 'Ошибка связи с ИИ. Попробуй позже.';
  }
}
</script>
