{% extends 'base.html' %}
{% block content %}
<div class="form-container">
  <div class="glass-card form-card">
    <div class="form-header-bar"></div>
    <h2 class="form-title">Сброс пароля</h2>

    {% if error %}
      <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-input" value="{{ username|default:'' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" value="{{ email|default:'' }}" required>
      </div>
      <button class="btn btn-full" type="submit">Отправить код</button>
    </form>
    <div class="form-footer">
      <p class="form-footer-text">
        <a href="{% url 'users:login' %}" class="form-footer-link">← Назад к входу</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
