{% extends 'base.html' %}
{% block content %}
<div class="form-container">
  <div class="glass-card form-card">
    <div class="form-header-bar"></div>
    <h2 class="form-title">Ввод кода</h2>
    <form method="post" id="reset-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Код с почты</label>
        <input type="text" name="code" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Новый пароль</label>
        <input type="password" name="new_password" id="new_password" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Подтверждение пароля</label>
        <input type="password" name="confirm_password" id="confirm_password" class="form-input" required>
        <p id="password-error" style="color: #ff4655; font-size: 0.75rem; display: none; margin-top: 4px;"></p>
      </div>
      <button class="btn btn-full" type="submit">Изменить пароль</button>
    </form>
    <div class="form-footer">
      <p class="form-footer-text">
        <a href="{% url 'users:login' %}" class="form-footer-link">← Назад к входу</a>
      </p>
    </div>
  </div>
</div>

<script>
document.getElementById('reset-form').addEventListener('submit', function(e) {
  const pass = document.getElementById('new_password').value;
  const confirm = document.getElementById('confirm_password').value;
  const error = document.getElementById('password-error');

  if (pass !== confirm) {
    e.preventDefault();
    error.textContent = 'Пароли не совпадают';
    error.style.display = 'block';
  } else if (pass.length < 6) {
    e.preventDefault();
    error.textContent = 'Пароль должен содержать минимум 6 символов';
    error.style.display = 'block';
  } else {
    error.style.display = 'none';
  }
});
</script>
{% endblock %}
