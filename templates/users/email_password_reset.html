<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля</title>
</head>
<body style="margin:0;padding:0;background:#0a081a;font-family:'Rajdhani',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:40px 0;">
                <table width="100%" max-width="480px" style="background:rgba(21,18,43,0.95);border-radius:16px;padding:32px;border:1px solid rgba(194,82,225,0.4);">
                    <tr>
                        <td align="center">
                            <div style="font-size:28px;margin-bottom:8px;">⚡</div>
                            <h2 style="color:#C252E1;font-family:'Orbitron',Arial,sans-serif;text-transform:uppercase;letter-spacing:2px;margin:0 0 16px 0;font-size:20px;">
                                Catalyst Cyber Lounge
                            </h2>
                            <div style="height:2px;background:linear-gradient(90deg,#C252E1,#6ECBF5);margin-bottom:20px;"></div>
                            
                            <h3 style="color:#6ECBF5;font-family:'Orbitron',Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;margin:0 0 12px 0;font-size:16px;">
                                Сброс пароля
                            </h3>
                            
                            <p style="color:#E0D9F6;font-size:14px;margin:0 0 20px 0;">
                                Вы запросили сброс пароля на сайте <strong style="color:#C252E1;">Catalyst Cyber Lounge</strong>.
                            </p>

                            <div style="background:rgba(10,8,26,0.9);border:1px solid rgba(110,203,245,0.3);border-radius:10px;padding:16px;margin:0 0 20px 0;">
                                <p style="color:rgba(255,255,255,0.5);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px 0;">
                                    Ваш код сброса:
                                </p>
                                <p style="font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:#6ECBF5;margin:0;letter-spacing:6px;text-shadow:0 0 15px rgba(110,203,245,0.4);">
                                    {{ reset_code }}
                                </p>
                            </div>

                            <p style="font-size:12px;color:#9ca3af;margin:0;">
                                Если вы не запрашивали сброс пароля – просто проигнорируйте это письмо.
                            </p>
                            
                            <div style="height:1px;background:rgba(110,203,245,0.2);margin:20px 0;"></div>
                            <p style="font-size:11px;color:rgba(255,255,255,0.3);margin:0;">
                                © Catalyst • Курск, пр-т Хрущёва, 2 • +7 (904) 525-22-29
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
