{% extends 'base.html' %}
{% block content %}

<div class="form-container">
  <div class="glass-card form-card">
    <div class="form-header-bar"></div>

    <h2 class="form-title">АВТОРИЗАЦИЯ</h2>

    <form method="post">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="form-error">
          {{ form.non_field_errors }}
        </div>
      {% endif %}

      <div class="form-group">
        <label class="form-label" for="{{ form.username.id_for_label }}">Логин</label>
        {{ form.username }}
      </div>

      <div class="form-group">
        <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
        {{ form.password }}
      </div>

      <button class="btn btn-full" type="submit">ВОЙТИ В СИСТЕМУ</button>
    </form>

    <div class="form-footer">
      <p class="form-footer-text">
        Не зарегистрированы?
        <a href="{% url 'users:register' %}" class="form-footer-link">Регистрация</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
