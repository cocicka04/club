{% extends "base.html" %}

{% block content %}
<section class="form-container">

  <div class="glass-card form-card">
    <div class="form-header-bar"></div>
    <h2 class="form-title">{{ title|default:"Создание тарифа" }}</h2>
    <p class="text-center mb-6">{{ subtitle|default:"Настройка стоимости и категории тарифа" }}</p>

    <form method="post" class="booking-form">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Категория ПК</label>
        {{ form.category }}
      </div>

      <div class="form-group">
        <label class="form-label">Название тарифа</label>
        {{ form.name }}
      </div>

      <div class="form-group">
        <label class="form-label">Цена за час (₽)</label>
        {{ form.price_per_hour }}
      </div>

      <div class="form-group">
        <label class="form-label">Описание</label>
        {{ form.description }}
      </div>

      <div class="flex justify-between items-center mt-8">
        <a href="{% url 'tariffs:list' %}" class="form-footer-link">← Назад к тарифам</a>
        <button type="submit" class="btn btn-lg">Сохранить</button>
      </div>

    </form>
  </div>
</section>
{% endblock %}
